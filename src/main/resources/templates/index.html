<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        /* Navbar */
        .navbar {
            background: #333;
            padding: 15px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            letter-spacing: 1px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #ffcc00;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            background: linear-gradient(135deg, #5f5fff, #8e8eff);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .hero button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background: #ffcc00;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero button:hover {
            background: #e6b800;
        }

        /* Footer */
        .footer {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>MyWebsite</h2>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <div>
            <h1>Welcome to My Website</h1>
            <p>Your one-stop place for awesome content.</p>
            <button>Get Started</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2025 MyWebsite. All Rights Reserved.
    </div>

</body>
</html>
